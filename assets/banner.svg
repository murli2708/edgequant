<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="440" viewBox="0 0 1280 440" font-family="'Inter','Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#04070F"/><stop offset="0.5" stop-color="#091A33"/><stop offset="1" stop-color="#0E2E5C"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#38BDF8" stop-opacity="0.30"/><stop offset="1" stop-color="#38BDF8" stop-opacity="0"/></radialGradient>
    <radialGradient id="glowB" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#14B8A6" stop-opacity="0.30"/><stop offset="1" stop-color="#14B8A6" stop-opacity="0"/></radialGradient>
    <linearGradient id="fp32" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#60A5FA"/><stop offset="1" stop-color="#2563EB"/></linearGradient>
    <linearGradient id="int8" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#38BDF8"/><stop offset="1" stop-color="#0EA5E9"/></linearGradient>
    <linearGradient id="int4" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#5EEAD4"/><stop offset="1" stop-color="#14B8A6"/></linearGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="ds" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.45"/></filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 Z" fill="#5EEAD4"/></marker>
  </defs>

  <rect width="1280" height="440" fill="url(#bg)"/>
  <circle cx="1040" cy="120" r="320" fill="url(#glowA)"/>
  <circle cx="980" cy="300" r="260" fill="url(#glowB)"/>
  <rect x="0" y="0" width="6" height="440" fill="#38BDF8"/>

  <g transform="translate(64,46)">
    <rect x="0" y="0" width="226" height="38" rx="19" fill="#38BDF8" fill-opacity="0.12" stroke="#38BDF8" stroke-opacity="0.55"/>
    <circle cx="26" cy="19" r="6" fill="#38BDF8" filter="url(#soft)"/>
    <text x="44" y="25" fill="#7DD3FC" font-family="'JetBrains Mono',monospace" font-size="16" letter-spacing="3">PHASE 2 · THE DIET</text>
  </g>
  <text x="1216" y="52" text-anchor="end" fill="#5E7E9E" font-family="'JetBrains Mono',monospace" font-size="15" letter-spacing="2">AURORA SERIES · 02 / 06</text>

  <text x="62" y="172" fill="#FFFFFF" font-size="84" font-weight="800" letter-spacing="-2">EdgeQuant</text>
  <text x="64" y="214" fill="#BAE6FD" font-size="26" font-weight="500">Shrink the model. Prove it still works.</text>
  <text x="64" y="246" fill="#6E93B5" font-size="18" font-family="'JetBrains Mono',monospace">quantize across backends — then benchmark the truth</text>

  <g transform="translate(64,286)" font-family="'JetBrains Mono',monospace">
    <g filter="url(#ds)">
      <rect x="0" y="0" width="150" height="74" rx="14" fill="#08182E" stroke="#38BDF8" stroke-opacity="0.4"/>
      <text x="16" y="34" fill="#7DD3FC" font-size="26" font-weight="800">~4×</text>
      <text x="16" y="58" fill="#7FA8C9" font-size="13">smaller (INT8)</text>
    </g>
    <g filter="url(#ds)" transform="translate(166,0)">
      <rect x="0" y="0" width="168" height="74" rx="14" fill="#08182E" stroke="#38BDF8" stroke-opacity="0.4"/>
      <text x="16" y="34" fill="#7DD3FC" font-size="26" font-weight="800">&lt; 1%</text>
      <text x="16" y="58" fill="#7FA8C9" font-size="13">accuracy drop</text>
    </g>
    <g filter="url(#ds)" transform="translate(350,0)">
      <rect x="0" y="0" width="176" height="74" rx="14" fill="#08182E" stroke="#38BDF8" stroke-opacity="0.4"/>
      <text x="16" y="34" fill="#7DD3FC" font-size="26" font-weight="800">≥ 80%</text>
      <text x="16" y="58" fill="#7FA8C9" font-size="13">on Neural Engine</text>
    </g>
  </g>

  <g transform="translate(792,64)" filter="url(#ds)">
    <rect x="0" y="0" width="424" height="312" rx="20" fill="#06121F" fill-opacity="0.74" stroke="#38BDF8" stroke-opacity="0.32"/>
    <text x="24" y="34" fill="#7DD3FC" font-family="'JetBrains Mono',monospace" font-size="14" letter-spacing="2">PRECISION → SIZE TRADEOFF</text>
    <line x1="24" y1="46" x2="400" y2="46" stroke="#38BDF8" stroke-opacity="0.18"/>

    <g transform="translate(60,66)">
      <!-- common baseline -->
      <line x1="-12" y1="158" x2="312" y2="158" stroke="#38BDF8" stroke-opacity="0.25"/>
      <!-- FP32 -->
      <rect x="0" y="8" width="74" height="150" rx="8" fill="url(#fp32)"/>
      <g fill="#06121F" opacity="0.32"><rect x="0" y="50" width="74" height="3"/><rect x="0" y="92" width="74" height="3"/><rect x="0" y="134" width="74" height="3"/></g>
      <text x="37" y="182" fill="#93C5FD" font-size="17" font-weight="700" text-anchor="middle" font-family="'JetBrains Mono',monospace">FP32</text>
      <text x="37" y="202" fill="#5E89B8" font-size="13" text-anchor="middle" font-family="'JetBrains Mono',monospace">1.00×</text>
      <path d="M88 90 H124" stroke="#38BDF8" stroke-width="3" marker-end="url(#ar)"/>
      <!-- INT8 -->
      <g transform="translate(136,0)">
        <rect x="0" y="58" width="56" height="100" rx="7" fill="url(#int8)"/>
        <g fill="#06121F" opacity="0.32"><rect x="0" y="100" width="56" height="3"/><rect x="0" y="134" width="56" height="3"/></g>
        <text x="28" y="182" fill="#7DD3FC" font-size="17" font-weight="700" text-anchor="middle" font-family="'JetBrains Mono',monospace">INT8</text>
        <text x="28" y="202" fill="#5E89B8" font-size="13" text-anchor="middle" font-family="'JetBrains Mono',monospace">~4× ↓</text>
      </g>
      <path d="M210 90 H246" stroke="#5EEAD4" stroke-width="3" marker-end="url(#ar)"/>
      <!-- INT4 -->
      <g transform="translate(258,0)">
        <rect x="0" y="96" width="42" height="62" rx="6" fill="url(#int4)"/>
        <text x="21" y="182" fill="#99F6E4" font-size="17" font-weight="700" text-anchor="middle" font-family="'JetBrains Mono',monospace">INT4</text>
        <text x="21" y="202" fill="#5E89B8" font-size="13" text-anchor="middle" font-family="'JetBrains Mono',monospace">~8× ↓</text>
      </g>
    </g>
    <line x1="24" y1="272" x2="400" y2="272" stroke="#38BDF8" stroke-opacity="0.18"/>
    <text x="212" y="294" fill="#9DBFD8" font-size="13" text-anchor="middle" font-family="'JetBrains Mono',monospace">one command regenerates the full report</text>
  </g>

  <g transform="translate(64,402)" font-family="'JetBrains Mono',monospace" font-size="13" fill="#BAE6FD">
    <g><rect x="0" y="0" width="118" height="26" rx="13" fill="#38BDF8" fill-opacity="0.14"/><text x="59" y="17" text-anchor="middle">ONNX Runtime</text></g>
    <g transform="translate(128,0)"><rect x="0" y="0" width="76" height="26" rx="13" fill="#38BDF8" fill-opacity="0.14"/><text x="38" y="17" text-anchor="middle">CoreML</text></g>
    <g transform="translate(214,0)"><rect x="0" y="0" width="72" height="26" rx="13" fill="#38BDF8" fill-opacity="0.14"/><text x="36" y="17" text-anchor="middle">LiteRT</text></g>
    <g transform="translate(296,0)"><rect x="0" y="0" width="94" height="26" rx="13" fill="#38BDF8" fill-opacity="0.14"/><text x="47" y="17" text-anchor="middle">llama.cpp</text></g>
  </g>
</svg>
